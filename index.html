<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tracker">
<title>Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Barlow:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --black:  #09090B;
    --black2: #111113;
    --black3: #1A1A1D;
    --black4: #222226;
    --gold:       #C9A84C;
    --gold-light: #E2C47A;
    --gold-dim:   #8A6A28;
    --gold-bg:    #1A1400;
    --pearl:      #F0EDE6;
    --pearl-dim:  #B8B4AC;
    --pearl-muted:#6B6860;
    --green:      #4ADE80;
    --green-bg:   #052010;
    --green-bd:   #166534;
    --red:        #F87171;
    --red-bg:     #1A0505;
    --red-bd:     #7F1D1D;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--black);color:var(--pearl);font-family:'Barlow',system-ui,sans-serif;min-height:100vh;padding-bottom:env(safe-area-inset-bottom,60px);}

  /* Toast */
  #toast{position:fixed;top:16px;left:50%;transform:translateX(-50%) translateY(-70px);background:var(--gold);color:var(--black);padding:10px 22px;border-radius:30px;font-size:13px;font-weight:700;z-index:999;box-shadow:0 4px 24px #0009;transition:transform .3s ease;white-space:nowrap;letter-spacing:.04em;}
  #toast.show{transform:translateX(-50%) translateY(0);}

  /* Header */
  #header{background:var(--black);border-bottom:1px solid #2A2000;padding:12px 12px 0;position:sticky;top:0;z-index:10;}
  .header-top{display:flex;justify-content:flex-start;align-items:center;margin-bottom:12px;}
  .nav-tabs{display:flex;gap:6px;width:100%;}
  .nav-btn{flex:1;padding:10px 6px;border-radius:10px;border:1px solid #2A2000;cursor:pointer;font-size:13px;font-weight:700;font-family:'Barlow',sans-serif;transition:all .15s;letter-spacing:.04em;text-transform:uppercase;text-align:center;}
  .nav-btn.active{background:var(--gold);color:var(--black);border-color:var(--gold);}
  .nav-btn.inactive{background:transparent;color:var(--gold-dim);}

  /* Day tabs */
  .day-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:12px;scrollbar-width:none;}
  .day-tabs::-webkit-scrollbar{display:none;}
  .day-tab{flex-shrink:0;padding:7px 16px;border-radius:20px;cursor:pointer;border:1px solid #2A2000;background:transparent;transition:all .15s;}
  .day-tab.active{border-color:var(--gold);background:var(--gold-bg);}
  .day-tab-name{font-size:14px;font-weight:700;color:var(--gold-dim);font-family:'Space Grotesk',sans-serif;letter-spacing:.05em;}
  .day-tab.active .day-tab-name{color:var(--gold);}
  .progress-bar-bg{margin-top:4px;height:2px;border-radius:2px;background:#2A2000;overflow:hidden;}
  .progress-bar-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .3s;}

  /* Main */
  #main{padding:12px;}
  .section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .section-title{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:var(--pearl);letter-spacing:.04em;}
  .set-count{font-size:14px;color:var(--gold-dim);font-weight:600;}

  /* Date row */
  .date-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;background:var(--black2);border:1px solid #2A2000;border-radius:10px;padding:9px 14px;}
  .date-label{font-size:12px;font-weight:700;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.1em;white-space:nowrap;}
  .date-input{flex:1;background:transparent;border:none;color:var(--pearl);font-size:16px;font-weight:600;font-family:'Barlow',sans-serif;outline:none;cursor:pointer;}
  .date-input::-webkit-calendar-picker-indicator{filter:invert(.7) sepia(1) hue-rotate(10deg) saturate(2);cursor:pointer;}

  /* Sheets status */
  .sheets-status{font-size:13px;font-family:'Barlow',sans-serif;font-weight:600;display:flex;align-items:center;gap:6px;margin-bottom:12px;flex-wrap:wrap;}
  .sheets-status.loading{color:var(--gold-dim);}
  .sheets-status.loaded{color:var(--green);}

  /* Exercise card grid */
  .ex-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
  .ex-card{background:var(--gold);border-radius:12px;padding:12px 10px 10px;cursor:pointer;transition:transform .15s,opacity .15s;position:relative;min-height:100px;display:flex;flex-direction:column;justify-content:space-between;border:2px solid transparent;}
  .ex-card.done{border-color:var(--black);box-shadow:inset 0 0 0 2px var(--black);}
  .ex-card.dragging{opacity:.4;}
  .ex-card.drag-over{border-color:var(--black);border-style:dashed;}
  .ex-card:active{transform:scale(.97);}
  .ex-card-drag{position:absolute;top:5px;right:6px;font-size:10px;color:var(--gold-dim);cursor:grab;touch-action:none;user-select:none;}
  .ex-card-name{font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:700;color:var(--black);line-height:1.25;flex:1;padding-right:12px;}
  .ex-card-cat{font-size:10px;font-weight:700;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.05em;margin-top:3px;}
  .ex-card-bottom{margin-top:6px;display:flex;flex-direction:column;gap:2px;}
  .ex-card-rec{font-size:11px;font-weight:700;color:var(--black);}
  .ex-card-meta{font-size:11px;color:var(--gold-dim);}
  .ex-card-logged{font-size:11px;font-weight:700;color:var(--green-bg);background:var(--black);padding:1px 4px;border-radius:4px;}
  .ex-card-done-dot{width:7px;height:7px;border-radius:50%;background:var(--black);flex-shrink:0;}

  /* Add / Save buttons */
  .add-exercise-btn{width:100%;padding:14px;border-radius:10px;border:1.5px dashed #2A2000;background:transparent;color:var(--gold-dim);font-size:15px;font-weight:700;cursor:pointer;margin-bottom:10px;font-family:'Barlow',sans-serif;letter-spacing:.04em;}
  .save-session-btn{width:100%;padding:18px;border-radius:12px;border:none;background:var(--gold);color:var(--black);font-size:18px;font-weight:800;cursor:pointer;font-family:'Space Grotesk',sans-serif;letter-spacing:.05em;}
  .sync-status{display:flex;align-items:center;gap:6px;font-size:14px;margin-top:8px;padding:8px 12px;border-radius:8px;font-weight:700;}
  .sync-status.syncing{background:var(--black2);color:var(--gold-dim);}
  .sync-status.success{background:var(--green-bg);color:var(--green);}
  .sync-status.error{background:var(--red-bg);color:var(--red);}

  /* Exercise input modal (bottom sheet) */
  .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.88);z-index:50;display:flex;align-items:flex-end;justify-content:center;}
  .modal-overlay.center{align-items:center;}
  .modal-box{background:var(--black2);border:1px solid #2A2000;border-radius:20px 20px 0 0;padding:20px 20px 40px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto;}
  .modal-box.center{border-radius:16px;margin:20px;max-height:85vh;}
  .modal-handle{width:40px;height:4px;background:#2A2000;border-radius:2px;margin:0 auto 16px;}
  .modal-title{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;color:var(--pearl);margin-bottom:2px;letter-spacing:.04em;}
  .modal-subtitle{font-size:13px;color:var(--gold-dim);margin-bottom:12px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;}
  .modal-rec{display:inline-flex;align-items:center;gap:6px;background:var(--gold-bg);border:1px solid var(--gold-dim);border-radius:20px;padding:6px 14px;font-size:13px;color:var(--gold);font-weight:700;margin-bottom:14px;}
  .modal-label{font-size:12px;font-weight:700;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;display:block;}
  .modal-input{width:100%;background:var(--black3);border:1px solid #2A2000;border-radius:8px;padding:11px 14px;color:var(--pearl);font-size:16px;font-weight:600;outline:none;margin-bottom:12px;font-family:'Barlow',sans-serif;}
  .modal-input:focus{border-color:var(--gold);}
  .modal-select{width:100%;background:var(--black3);border:1px solid #2A2000;border-radius:8px;padding:11px 14px;color:var(--pearl);font-size:16px;font-weight:600;outline:none;margin-bottom:16px;font-family:'Barlow',sans-serif;appearance:none;}
  .modal-select:focus{border-color:var(--gold);}

  /* Sets table inside modal */
  .sets-tbl{width:100%;border-collapse:collapse;margin-bottom:10px;}
  .sets-tbl th{font-size:12px;font-weight:700;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.07em;padding:0 4px 10px;text-align:left;}
  .sets-tbl th:last-child{text-align:center;}
  .sets-tbl td{padding:4px;vertical-align:middle;}
  .set-num-td{font-size:15px;font-weight:700;color:var(--gold-dim);text-align:center;width:32px;}
  .done-row .set-num-td{color:var(--green);}
  .set-inp-td input{width:100%;background:var(--black3);border:1px solid #2A2000;border-radius:7px;padding:10px 12px;color:var(--pearl);font-size:16px;font-weight:600;outline:none;font-family:'Barlow',sans-serif;}
  .set-inp-td input:focus{border-color:var(--gold);}
  .done-row .set-inp-td input{background:var(--green-bg);border-color:var(--green-bd);}
  .chk-td{text-align:center;width:36px;}
  .chk-btn{width:30px;height:30px;border-radius:8px;border:1px solid #2A2000;cursor:pointer;background:var(--black3);color:var(--pearl-muted);font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s;margin:auto;}
  .chk-btn.checked{background:var(--green-bg);color:var(--green);border-color:var(--green-bd);}

  .notes-label{font-size:12px;font-weight:700;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.08em;margin-top:8px;margin-bottom:5px;display:block;}
  .notes-inp{width:100%;background:var(--black3);border:1px solid #2A2000;border-radius:8px;padding:10px 14px;color:var(--pearl);font-size:15px;font-family:'Barlow',sans-serif;outline:none;resize:none;min-height:44px;}
  .notes-inp:focus{border-color:var(--gold);}

  .cardio-row{display:flex;align-items:center;gap:10px;padding:10px 0;}
  .cardio-lbl{font-size:15px;color:var(--gold);font-weight:700;}
  .cardio-inp{background:var(--black3);border:1px solid #2A2000;border-radius:7px;padding:10px 12px;color:var(--pearl);font-size:16px;width:90px;outline:none;font-family:'Barlow',sans-serif;}
  .cardio-inp:focus{border-color:var(--gold);}

  .modal-btns{display:flex;gap:8px;margin-top:20px;}
  .modal-btn-primary{flex:1;padding:14px;border-radius:10px;border:none;background:var(--gold);color:var(--black);font-size:16px;font-weight:800;cursor:pointer;font-family:'Space Grotesk',sans-serif;letter-spacing:.04em;}
  .modal-btn-cancel{flex:1;padding:14px;border-radius:10px;border:1px solid #2A2000;background:transparent;color:var(--pearl-muted);font-size:16px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;}
  .modal-btn-danger{flex:1;padding:14px;border-radius:10px;border:1px solid var(--red-bd);background:var(--red-bg);color:var(--red);font-size:16px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;}

  .rename-row{display:flex;gap:6px;align-items:center;margin-bottom:12px;}
  .rename-inp{flex:1;background:var(--black3);border:1.5px solid var(--gold);border-radius:7px;padding:8px 12px;color:var(--pearl);font-size:14px;font-weight:600;outline:none;font-family:'Barlow',sans-serif;}
  .rename-save{padding:8px 12px;border-radius:7px;border:none;background:var(--gold);color:var(--black);font-size:12px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;}
  .rename-clear{padding:8px 12px;border-radius:7px;border:none;background:var(--black4);color:var(--pearl-muted);font-size:12px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;}

  /* Dashboard */
  .dash-card{background:var(--black2);border:1px solid #2A2000;border-radius:12px;padding:16px;margin-bottom:12px;}
  .dash-card-title{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;color:var(--gold);margin-bottom:10px;letter-spacing:.04em;}
  .stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
  .stat-box{background:var(--black3);border-radius:8px;padding:10px;}
  .stat-label{font-size:12px;color:var(--gold-dim);font-weight:700;text-transform:uppercase;letter-spacing:.07em;}
  .stat-value{font-family:'Space Grotesk',sans-serif;font-size:24px;font-weight:700;margin-top:2px;color:var(--pearl);}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px;}
  .cal-cell{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:clamp(11px,3.5vw,16px);font-weight:700;background:var(--black3);color:var(--pearl-muted);opacity:.45;font-family:'Barlow',sans-serif;}
  .cal-cell.has-session{background:var(--gold-bg);color:var(--gold);opacity:1;border:1px solid var(--gold-dim);cursor:pointer;}
  .cal-cell.empty{background:transparent;opacity:0;}
  .cal-cell.selected{outline:2px solid var(--gold);opacity:1;}
  .cal-dow{font-size:11px;color:var(--gold-dim);text-align:center;font-weight:700;letter-spacing:.05em;}

  /* History table */
  .hist-wrap{background:var(--black2);border:1px solid #2A2000;border-radius:12px;margin-bottom:12px;overflow:hidden;}
  .hist-head{padding:12px 14px;border-bottom:1px solid #2A2000;display:flex;justify-content:space-between;align-items:center;}
  .hist-day{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;color:var(--pearl);letter-spacing:.04em;}
  .hist-date{font-size:13px;color:var(--gold-dim);font-weight:600;}
  .hist-badge{font-size:12px;padding:3px 10px;border-radius:5px;font-weight:700;}
  .hist-badge.synced{background:var(--green-bg);color:var(--green);border:1px solid var(--green-bd);}
  .hist-badge.local{background:var(--black3);color:var(--pearl-muted);border:1px solid #2A2000;}
  .hist-tbl{width:100%;border-collapse:collapse;font-size:13px;}
  .hist-tbl th{font-size:12px;font-weight:700;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.07em;padding:8px 10px;text-align:left;border-bottom:1px solid #2A2000;white-space:nowrap;}
  .hist-tbl td{padding:9px 10px;border-bottom:1px solid #111113;color:var(--pearl);vertical-align:middle;}
  .hist-tbl tr:last-child td{border-bottom:none;}
  .hist-tbl td.ex-name{font-weight:700;color:var(--pearl);}
  .hist-tbl td.set-val{color:var(--gold);font-weight:700;}
  .hist-tbl td.note-val{color:var(--pearl-muted);font-size:11px;}

  /* Export / Save */
  .export-card{background:var(--black2);border:1px solid #2A2000;border-radius:12px;padding:16px;margin-bottom:12px;}
  .export-card-title{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;color:var(--gold);margin-bottom:4px;}
  .export-card-desc{font-size:15px;color:var(--pearl-muted);margin-bottom:12px;line-height:1.6;}
  .export-btns{display:flex;gap:8px;}
  .export-btn-p{flex:1;padding:14px;border-radius:10px;border:none;background:var(--gold);color:var(--black);font-size:15px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;}
  .export-btn-s{flex:1;padding:14px;border-radius:10px;border:1px solid #2A2000;background:transparent;color:var(--gold-dim);font-size:15px;font-weight:700;cursor:pointer;font-family:'Barlow',sans-serif;}
  .danger-card{background:var(--red-bg);border:1px solid var(--red-bd);border-radius:12px;padding:16px;}
  .danger-title{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;color:var(--red);margin-bottom:4px;}
  .danger-btn{width:100%;padding:14px;border-radius:10px;border:1px solid var(--red-bd);background:transparent;color:var(--red);font-size:15px;font-weight:700;cursor:pointer;margin-top:12px;font-family:'Barlow',sans-serif;}
  .status-ok{font-size:15px;color:var(--green);}
  .status-sub{font-size:14px;color:var(--pearl-muted);margin-top:4px;}
  .sheets-badge{display:inline-flex;align-items:center;gap:6px;background:var(--green-bg);border:1px solid var(--green-bd);border-radius:8px;padding:7px 14px;font-size:14px;color:var(--green);font-weight:700;margin-top:8px;}
  .empty-state{text-align:center;padding:60px 20px;color:#2A2000;font-size:16px;}
  .empty-icon{font-size:40px;margin-bottom:12px;opacity:.4;}

  @media (max-width: 380px) {
    .ex-grid { grid-template-columns: repeat(2,1fr); }
    .nav-btn { font-size: 11px; padding: 9px 4px; }
  }
  @media (min-width: 600px) {
    #main { max-width: 640px; margin: 0 auto; }
    #header { max-width: 640px; margin: 0 auto; left: 0; right: 0; }
    .ex-grid { grid-template-columns: repeat(3,1fr); gap: 10px; }
  }
</style>
</head>
<body>
<div id="toast"></div>
<div id="modal-container"></div>
<div id="header">
  <div class="header-top">
    <div class="nav-tabs" style="width:100%;">
      <button class="nav-btn active" onclick="switchView('workout')">Today</button>
      <button class="nav-btn inactive" onclick="switchView('dashboard')">Dashboard</button>
      <button class="nav-btn inactive" id="history-nav-btn" onclick="switchView('history')">History</button>
      <button class="nav-btn inactive" onclick="switchView('export')">Save</button>
    </div>
  </div>
  <div class="day-tabs" id="day-tabs"></div>
</div>
<div id="main"></div>

<script>
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyk6k4sMctFDhkLP0__0D5dKqOL0cHPDc0Znkxr5NaFFQOl65p7dv_hEg9srGQiuYxqZw/exec";

const DEFAULT_PLAN = {

    { name: "Lat Pulldown", category: "Secondary Compound", sets: 3, targetReps: "8–10", rest: "90s–2 mins" },
    { name: "Cable Machine Chest Fly", category: "Isolation", sets: 3, targetReps: "12–15", rest: "60–90s" },
    { name: "Cable Rear Delt Pulls", category: "Isolation", sets: 3, targetReps: "12–15", rest: "60–90s" },
    { name: "Dumbbell Lateral Raises", category: "Isolation", sets: 3, targetReps: "12–15", rest: "60–90s" },
    { name: "Cable Lateral Raises", category: "Isolation", sets: 3, targetReps: "12–15", rest: "60–90s" },

  ]},
  "Lower 1": { exercises: [
    { name: "Hack Squat", category: "Primary Compound", sets: 3, targetReps: "8–10", rest: "2–3 mins" },
    { name: "Romanian Deadlift", category: "Primary Compound", sets: 3, targetReps: "8–10", rest: "2–3 mins" },
    { name: "Bulgarian Split Squat", category: "Secondary Compound", sets: 3, targetReps: "10–12", rest: "90s–2 mins" },
    { name: "Leg Extension", category: "Isolation", sets: 3, targetReps: "12–15", rest: "60–90s" },

  ]},
  "Upper 2": { exercises: [
    { name: "Lat Pulldown Superset", category: "Secondary Compound", sets: 3, targetReps: "Wide:8 / Mid:AMRAP / Under:AMRAP", rest: "90s–2 mins", isSuperset: true },
    { name: "Chest Supported Row", category: "Secondary Compound", sets: 3, targetReps: "8–10", rest: "90s–2 mins" },
    { name: "Incline Dumbbell Chest Press", category: "Primary Compound", sets: 3, targetReps: "6–8", rest: "2–3 mins" },
    { name: "Seated Shoulder Press", category: "Secondary Compound", sets: 3, targetReps: "8–10", rest: "90s–2 mins" },
    { name: "Tricep Pullover", category: "Isolation", sets: 3, targetReps: "12–15", rest: "60–90s" },
    { name: "Cable Lateral Raises", category: "Isolation", sets: 3, targetReps: "12–15", rest: "60–90s" },
    { name: "Face Pulls", category: "Isolation", sets: 3, targetReps: "12–15", rest: "60–90s" },
    { name: "Incline Dumbbell Curl", category: "Isolation", sets: 3, targetReps: "12–15", rest: "60–90s" },
    { name: "EZ Bar Preacher Curl", category: "Isolation", sets: 3, targetReps: "12–15", rest: "60–90s" },
    { name: "Hammer Curl", category: "Isolation", sets: 3, targetReps: "12–15", rest: "60–90s" },
  ]},
  "Lower 2": { exercises: [
    { name: "Hack Squat", category: "Primary Compound", sets: 3, targetReps: "8–10", rest: "2–3 mins" },
    { name: "Romanian Deadlift", category: "Primary Compound", sets: 3, targetReps: "8–10", rest: "2–3 mins" },
    { name: "Bulgarian Split Squat", category: "Secondary Compound", sets: 3, targetReps: "10–12", rest: "90s–2 mins" },
    { name: "Abductor Machine", category: "Isolation", sets: 3, targetReps: "12–15", rest: "60–90s" },
    { name: "Adductor Machine", category: "Isolation", sets: 3, targetReps: "12–15", rest: "60–90s" },
    { name: "Leg Extension", category: "Isolation", sets: 3, targetReps: "12–15", rest: "60–90s" },
    { name: "Lying Leg Curl", category: "Isolation", sets: 3, targetReps: "12–15", rest: "60–90s" },
    { name: "Treadmill Incline Walk", category: "Cardio Finisher", sets: null, targetReps: "15 mins", rest: "—", isCardio: true },
  ]}
};

const CATEGORIES = ["Primary Compound","Secondary Compound","Isolation","Cardio Finisher","Other"];
const STORAGE_KEY = "wt_v10";

function load() { try { const r = localStorage.getItem(STORAGE_KEY); if (r) return JSON.parse(r); } catch(e) {} return null; }
function persist() { try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ workoutPlan, sessionData, exerciseNames, comments, history, sessionDates, sheetsHistory })); } catch(e) {} }
function initSetsForDay(day) {
  return workoutPlan[day].exercises.map(ex =>
    ex.isCardio ? { logged: [{ duration: "" }] }
    : { logged: Array.from({ length: ex.sets }, () => ({ weight: "", reps: "", done: false })) }
  );
}
function initNamesForDay(day) { return workoutPlan[day].exercises.map(ex => ex.name); }
function initCommentsForDay(day) { return workoutPlan[day].exercises.map(() => ""); }
function todayStr() { return new Date().toISOString().split("T")[0]; }

const saved = load();
let workoutPlan = saved?.workoutPlan || JSON.parse(JSON.stringify(DEFAULT_PLAN));
let sessionData = saved?.sessionData || {};
let exerciseNames = saved?.exerciseNames || {};
let comments = saved?.comments || {};
let history = saved?.history || [];
let sessionDates = saved?.sessionDates || {};
let sheetsHistory = saved?.sheetsHistory || {};
let sheetsLoaded = false, sheetsLoading = false, sheetsDebug = "";

let DAYS = Object.keys(workoutPlan);
DAYS.forEach(d => {
  if (!sessionData[d]) sessionData[d] = initSetsForDay(d);
  if (!exerciseNames[d]) exerciseNames[d] = initNamesForDay(d);
  if (!comments[d]) comments[d] = initCommentsForDay(d);
  if (!sessionDates[d]) sessionDates[d] = todayStr();
});

let activeDay = DAYS[0];
let currentView = "workout";
let syncState = null, syncMessage = "";
let dragSrcIdx = null, dragOverIdx = null, touchDragIdx = null, touchClone = null, touchStartY = 0;
let dashSelectedDate = null;

// ── Sheets fetch ──────────────────────────────────────────────
async function fetchSheetsHistory() {
  if (sheetsLoading) return;
  sheetsLoading = true; sheetsLoaded = false; sheetsDebug = ""; render();
  try {
    const res = await fetch(APPS_SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "getHistory" }) });
    const text = await res.text();
    let data;
    try { data = JSON.parse(text); } catch(e) { sheetsDebug = "Parse error"; sheetsLoading = false; render(); return; }
    if (data.history) {
      sheetsHistory = {};
      data.history.forEach(row => {
        const name = (row.exercise||"").toLowerCase();
        const w = parseFloat(row.weight);
        if (name && !isNaN(w)) { if (!sheetsHistory[name] || w > sheetsHistory[name]) sheetsHistory[name] = w; }
      });
      sheetsLoaded = true;
      sheetsDebug = `${data.history.length} rows from ${data.sheetsScanned ?? "?"} tabs`;
      persist();
    }
  } catch(e) { sheetsDebug = "Fetch failed: " + e.toString(); }
  sheetsLoading = false; render();
}

async function fetchSheetsSessions() {
  try {
    const res = await fetch(APPS_SCRIPT_URL, { method: "POST", body: JSON.stringify({ action: "getSessions" }) });
    const data = await res.json();
    if (data.sessions) {
      const localUnsynced = history.filter(h => !h.synced);
      const merged = [...data.sessions, ...localUnsynced];
      merged.sort((a,b) => (b.sheetTab||"").localeCompare(a.sheetTab||""));
      history = merged; persist(); render();
    }
  } catch(e) {}
}
// ─────────────────────────────────────────────────────────────

function getLastWeight(exName) {
  for (const h of history) {
    const ex = h.exercises.find(e => e.name.toLowerCase() === exName.toLowerCase());
    if (ex) {
      const ws = ex.sets.filter(s => s.done && s.weight).map(s => parseFloat(s.weight)).filter(w => !isNaN(w));
      if (ws.length > 0) return Math.max(...ws);
    }
  }
  return sheetsHistory[exName.toLowerCase()] || null;
}

function getSuggestion(exName, day) {
  const last = getLastWeight(exName);
  if (last === null) return null;
  const isLower = day.toLowerCase().includes("lower");
  return { value: last + (isLower ? 10 : 5), last, isLower };
}

function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 2500);
}

function switchView(v) {
  currentView = v;
  document.querySelectorAll(".nav-btn").forEach((b, i) => {
    b.className = "nav-btn " + (["workout","dashboard","history","export"][i] === v ? "active" : "inactive");
  });
  document.getElementById("day-tabs").style.display = v === "workout" ? "flex" : "none";
  render();
}

function completedSets(day) { return (sessionData[day]||[]).reduce((a, ex) => a + ex.logged.filter(s => s.done).length, 0); }
function totalSets(day) { return workoutPlan[day].exercises.reduce((a, ex) => a + (ex.sets || 0), 0); }

function renderDayTabs() {
  document.getElementById("day-tabs").innerHTML = DAYS.map(d => {
    const comp = completedSets(d), tot = totalSets(d);
    const pct = tot > 0 ? Math.round(comp/tot*100) : 0;
    const isActive = d === activeDay;
    return `<button class="day-tab ${isActive?'active':''}" onclick="selectDay('${d}')">
      <div class="day-tab-name">${d}</div>
      ${pct > 0 ? `<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>` : ""}
    </button>`;
  }).join("");
}

function selectDay(day) { activeDay = day; syncState = null; renderDayTabs(); render(); }

function render() {
  renderDayTabs();
  const main = document.getElementById("main");
  if (currentView === "workout") main.innerHTML = renderWorkout();
  else if (currentView === "dashboard") main.innerHTML = renderDashboard();
  else if (currentView === "history") main.innerHTML = renderHistory();
  else main.innerHTML = renderExport();
  const hBtn = document.getElementById("history-nav-btn");
  if (hBtn) hBtn.textContent = history.length > 0 ? `History (${history.length})` : "History";
  if (currentView === "workout") bindDragEvents();
}

// ── Workout ───────────────────────────────────────────────────
function renderWorkout() {
  const plan = workoutPlan[activeDay];
  const data = sessionData[activeDay];
  const names = exerciseNames[activeDay];
  const comp = completedSets(activeDay), tot = totalSets(activeDay);

  let syncHtml = "";
  if (syncState === "syncing") syncHtml = `<div class="sync-status syncing">Syncing to Google Sheets...</div>`;
  else if (syncState === "success") syncHtml = `<div class="sync-status success">Synced to Google Sheets</div>`;
  else if (syncState === "error") syncHtml = `<div class="sync-status error">${syncMessage} — saved locally</div>`;

  let sheetsHtml = "";
  if (sheetsLoading) sheetsHtml = `<div class="sheets-status loading">Loading history from Sheets...</div>`;
  else if (sheetsLoaded) sheetsHtml = `<div class="sheets-status loaded">History loaded — ${sheetsDebug}</div>`;
  else sheetsHtml = `<div class="sheets-status loading">
    <button onclick="fetchSheetsHistory()" style="background:var(--gold-bg);border:1px solid var(--gold-dim);color:var(--gold);padding:5px 12px;border-radius:20px;cursor:pointer;font-family:Barlow,sans-serif;font-size:11px;font-weight:700;">Load history from Sheets</button>
    ${sheetsDebug ? `<span style="color:var(--red);font-size:11px;">${sheetsDebug}</span>` : ""}
  </div>`;

  const currentDate = sessionDates[activeDay] || todayStr();

  let cards = `<div class="ex-grid">`;
  plan.exercises.forEach((ex, exIdx) => {
    const exData = data[exIdx];
    const displayName = names[exIdx];
    const allDone = !ex.isCardio && exData.logged.every(s => s.done);
    const doneSets = ex.isCardio ? (exData.logged[0].duration ? 1 : 0) : exData.logged.filter(s => s.done).length;
    const sug = getSuggestion(displayName, activeDay);
    const loggedSummary = doneSets > 0 && !ex.isCardio
      ? exData.logged.filter(s => s.done).map(s => `${s.weight||"—"}×${s.reps||"—"}`).join(" ")
      : (ex.isCardio && exData.logged[0].duration ? `${exData.logged[0].duration}m` : "");

    cards += `<div class="ex-card ${allDone?'done':''}" data-idx="${exIdx}" onclick="openCard(${exIdx})" draggable="true">
      <div class="ex-card-drag" id="drag-${exIdx}" onclick="event.stopPropagation()">&#8597;</div>
      <div>
        <div style="display:flex;justify-content:space-between;align-items:flex-start;">
          <div class="ex-card-name">${displayName}</div>
          ${allDone ? '<div class="ex-card-done-dot"></div>' : ""}
        </div>
        <div class="ex-card-cat">${ex.category}</div>
      </div>
      <div class="ex-card-bottom">
        ${sug ? `<div class="ex-card-rec">Suggest: ${sug.value}lbs</div>` : ""}
        ${loggedSummary ? `<div class="ex-card-logged">${loggedSummary}</div>` : `<div class="ex-card-meta">${ex.isCardio ? ex.targetReps : `${ex.sets}×${ex.targetReps}`}</div>`}
      </div>
    </div>`;
  });
  cards += `</div>`;

  return `<div style="padding:16px">
    <div class="section-header">
      <div class="section-title">${activeDay}</div>
      <div class="set-count">${comp}/${tot} sets</div>
    </div>
    <div class="date-row">
      <span class="date-label">Date</span>
      <input class="date-input" type="date" value="${currentDate}" onchange="updateSessionDate(this.value)">
    </div>
    ${sheetsHtml}
    ${cards}
    <button class="add-exercise-btn" onclick="showAddExercise()">+ Add Exercise</button>
    <button class="save-session-btn" onclick="saveSession()">Save ${activeDay}</button>
    ${syncHtml}
  </div>`;
}

function openCard(exIdx) {
  const plan = workoutPlan[activeDay];
  const ex = plan.exercises[exIdx];
  const exData = sessionData[activeDay][exIdx];
  const displayName = exerciseNames[activeDay][exIdx];
  const comment = comments[activeDay][exIdx] || "";
  const sug = getSuggestion(displayName, activeDay);

  let recHtml = sug
    ? `<div class="modal-rec">Suggested: ${sug.value}lbs &nbsp;·&nbsp; Last: ${sug.last}lbs ${sug.isLower ? "(+10 lower)" : "(+5 upper)"}</div>`
    : "";

  let bodyHtml = "";
  if (ex.isCardio) {
    bodyHtml = `<div class="cardio-row">
      <span class="cardio-lbl">Speed 3.0 · 8–10% incline</span>
      <input class="cardio-inp" inputmode="numeric" placeholder="Mins" value="${exData.logged[0].duration||""}" onchange="updateCardio(${exIdx},this.value)">
    </div>`;
  } else {
    bodyHtml = `<table class="sets-tbl">
      <thead><tr><th>#</th><th>Weight (lbs)</th><th>Reps</th><th></th></tr></thead><tbody>`;
    exData.logged.forEach((s, setIdx) => {
      bodyHtml += `<tr class="${s.done?'done-row':''}">
        <td class="set-num-td">${setIdx+1}</td>
        <td class="set-inp-td"><input inputmode="decimal" type="text" pattern="[0-9]*\\.?[0-9]*" placeholder="###" value="${s.weight}" onchange="updateSet(${exIdx},${setIdx},'weight',this.value)"></td>
        <td class="set-inp-td"><input inputmode="numeric" pattern="[0-9]*" placeholder="###" value="${s.reps}" onchange="updateSet(${exIdx},${setIdx},'reps',this.value)"></td>
        <td class="chk-td"><button class="chk-btn ${s.done?'checked':''}" onclick="toggleDoneModal(${exIdx},${setIdx})">&#10003;</button></td>
      </tr>`;
    });
    bodyHtml += `</tbody></table>`;
  }

  document.getElementById("modal-container").innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
      <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:2px;">
          <div style="flex:1">
            <div class="modal-title">${displayName}</div>
            <div class="modal-subtitle">${ex.category} · ${ex.targetReps} · ${ex.rest} rest</div>
          </div>
          <div style="display:flex;gap:6px;flex-shrink:0;margin-left:10px;">
            <button onclick="showRenameCard(${exIdx})" style="background:var(--black4);border:1px solid #2A2000;color:var(--pearl-muted);padding:5px 8px;border-radius:7px;cursor:pointer;font-size:12px;">&#9998;</button>
            <button onclick="deleteExercise(${exIdx})" style="background:var(--red-bg);border:1px solid var(--red-bd);color:var(--red);padding:5px 8px;border-radius:7px;cursor:pointer;font-size:12px;">&#128465;</button>
          </div>
        </div>
        ${recHtml}
        ${bodyHtml}
        <span class="notes-label">Notes</span>
        <textarea class="notes-inp" placeholder="Add notes..." onchange="updateComment(${exIdx},this.value)">${comment.replace(/"/g,'&quot;')}</textarea>
        <div class="modal-btns">
          <button class="modal-btn-cancel" onclick="closeModal()">Close</button>
        </div>
      </div>
    </div>`;
}

function toggleDoneModal(exIdx, setIdx) {
  sessionData[activeDay][exIdx].logged[setIdx].done = !sessionData[activeDay][exIdx].logged[setIdx].done;
  persist(); openCard(exIdx); renderDayTabs();
}

function showRenameCard(exIdx) {
  const current = exerciseNames[activeDay][exIdx];
  document.getElementById("modal-container").innerHTML = `
    <div class="modal-overlay center" onclick="if(event.target===this)closeModal()">
      <div class="modal-box center" onclick="event.stopPropagation()">
        <div class="modal-title" style="margin-bottom:12px;">Rename Exercise</div>
        <div class="rename-row">
          <input class="rename-inp" id="rename-inp" value="${current}" autofocus onkeydown="if(event.key==='Enter')commitRename(${exIdx})">
          <button class="rename-save" onclick="commitRename(${exIdx})">Save</button>
          <button class="rename-clear" onclick="document.getElementById('rename-inp').value='';document.getElementById('rename-inp').focus()">Clear</button>
        </div>
        <button class="modal-btn-cancel" onclick="openCard(${exIdx})" style="width:100%;padding:10px;border-radius:9px;border:1px solid #2A2000;background:transparent;color:var(--pearl-muted);font-size:13px;font-weight:700;cursor:pointer;font-family:Barlow,sans-serif;">Cancel</button>
      </div>
    </div>`;
  setTimeout(() => { const i = document.getElementById("rename-inp"); if(i){i.focus();i.select();} }, 30);
}

function commitRename(exIdx) {
  const inp = document.getElementById("rename-inp");
  const val = inp ? inp.value.trim() : "";
  if (val) exerciseNames[activeDay][exIdx] = val;

}

function deleteExercise(exIdx) {
  const name = exerciseNames[activeDay][exIdx];
  document.getElementById("modal-container").innerHTML = `
    <div class="modal-overlay center" onclick="if(event.target===this)closeModal()">
      <div class="modal-box center" onclick="event.stopPropagation()">
        <div class="modal-title" style="margin-bottom:10px;">Delete Exercise</div>
        <div style="font-size:13px;color:var(--pearl-muted);margin-bottom:20px;">Remove "${name}" from ${activeDay}? Past history is unaffected.</div>
        <div class="modal-btns">
          <button class="modal-btn-cancel" onclick="openCard(${exIdx})">Cancel</button>
          <button class="modal-btn-danger" onclick="commitDelete(${exIdx})">Delete</button>
        </div>
      </div>
    </div>`;
}

function commitDelete(exIdx) {
  workoutPlan[activeDay].exercises.splice(exIdx, 1);
  sessionData[activeDay].splice(exIdx, 1);
  exerciseNames[activeDay].splice(exIdx, 1);
  comments[activeDay].splice(exIdx, 1);
  closeModal(); persist(); render();
  showToast("Exercise removed");
}

function showAddExercise() {
  const catOptions = CATEGORIES.map(c => `<option value="${c}">${c}</option>`).join("");
  document.getElementById("modal-container").innerHTML = `
    <div class="modal-overlay center" onclick="if(event.target===this)closeModal()">
      <div class="modal-box center" onclick="event.stopPropagation()">
        <div class="modal-title" style="margin-bottom:14px;">Add Exercise</div>
        <label class="modal-label">Exercise Name</label>
        <input class="modal-input" id="new-ex-name" placeholder="e.g. Cable Curl" type="text" autofocus>
        <label class="modal-label">Category</label>
        <select class="modal-select" id="new-ex-cat">${catOptions}</select>
        <label class="modal-label">Target Reps</label>
        <input class="modal-input" id="new-ex-reps" placeholder="e.g. 12–15" type="text">
        <label class="modal-label">Rest</label>
        <input class="modal-input" id="new-ex-rest" placeholder="e.g. 60–90s" type="text" style="margin-bottom:4px">
        <div class="modal-btns">
          <button class="modal-btn-cancel" onclick="closeModal()">Cancel</button>
          <button class="modal-btn-primary" onclick="commitAddExercise()">Add</button>
        </div>
      </div>
    </div>`;
}

function closeModal() { document.getElementById("modal-container").innerHTML = ""; render(); }

function commitAddExercise() {
  const name = document.getElementById("new-ex-name").value.trim();
  const category = document.getElementById("new-ex-cat").value;
  const targetReps = document.getElementById("new-ex-reps").value.trim() || "12–15";
  const rest = document.getElementById("new-ex-rest").value.trim() || "60–90s";
  if (!name) { showToast("Enter a name"); return; }
  workoutPlan[activeDay].exercises.push({ name, category, sets: 3, targetReps, rest });
  sessionData[activeDay].push({ logged: Array.from({ length: 3 }, () => ({ weight: "", reps: "", done: false })) });
  exerciseNames[activeDay].push(name);
  comments[activeDay].push("");
  closeModal(); persist(); render();
  showToast(`${name} added`);
}

function updateSessionDate(val) { sessionDates[activeDay] = val; persist(); }
function updateSet(exIdx, setIdx, field, value) { sessionData[activeDay][exIdx].logged[setIdx][field] = value; persist(); }
function updateCardio(exIdx, value) { sessionData[activeDay][exIdx].logged[0].duration = value; persist(); }
function updateComment(exIdx, value) { comments[activeDay][exIdx] = value; persist(); }

function bindDragEvents() {
  document.querySelectorAll(".ex-card[data-idx]").forEach(card => {
    const idx = parseInt(card.dataset.idx);
    card.addEventListener("dragstart", e => { dragSrcIdx = idx; setTimeout(() => card.classList.add("dragging"), 0); e.stopPropagation(); });
    card.addEventListener("dragend", () => { card.classList.remove("dragging"); document.querySelectorAll(".ex-card").forEach(c => c.classList.remove("drag-over")); dragSrcIdx = null; dragOverIdx = null; });
    card.addEventListener("dragover", e => { e.preventDefault(); if (dragSrcIdx === null || dragSrcIdx === idx) return; document.querySelectorAll(".ex-card").forEach(c => c.classList.remove("drag-over")); card.classList.add("drag-over"); dragOverIdx = idx; });
    card.addEventListener("drop", e => { e.preventDefault(); if (dragSrcIdx === null || dragSrcIdx === idx) return; reorderExercise(dragSrcIdx, idx); });
    const handle = card.querySelector(".ex-card-drag");
    if (!handle) return;
    handle.addEventListener("touchstart", e => {
      touchDragIdx = idx; touchStartY = e.touches[0].clientY;
      const rect = card.getBoundingClientRect();
      touchClone = card.cloneNode(true);
      touchClone.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:.85;z-index:100;pointer-events:none;border:2px solid var(--black);border-radius:12px;`;
      document.body.appendChild(touchClone);
      card.style.opacity = ".3";
      e.preventDefault(); e.stopPropagation();
    }, { passive: false });
  });
  document.addEventListener("touchmove", onTouchMove, { passive: false });
  document.addEventListener("touchend", onTouchEnd);
}

function onTouchMove(e) {
  if (touchDragIdx === null || !touchClone) return;
  e.preventDefault();
  const touch = e.touches[0];
  const dy = touch.clientY - touchStartY;
  const orig = document.querySelector(`.ex-card[data-idx="${touchDragIdx}"]`);
  if (orig) { const r = orig.getBoundingClientRect(); touchClone.style.top = (r.top + dy) + "px"; }
  document.querySelectorAll(".ex-card[data-idx]").forEach(c => {
    const r = c.getBoundingClientRect();
    if (touch.clientY >= r.top && touch.clientY <= r.bottom) {
      const oi = parseInt(c.dataset.idx);
      if (oi !== touchDragIdx) { document.querySelectorAll(".ex-card").forEach(x => x.classList.remove("drag-over")); c.classList.add("drag-over"); dragOverIdx = oi; }
    }
  });
}

function onTouchEnd() {
  if (touchDragIdx === null) return;
  if (touchClone) { touchClone.remove(); touchClone = null; }
  const orig = document.querySelector(`.ex-card[data-idx="${touchDragIdx}"]`);
  if (orig) orig.style.opacity = "";
  document.querySelectorAll(".ex-card").forEach(c => c.classList.remove("drag-over"));
  if (dragOverIdx !== null && dragOverIdx !== touchDragIdx) reorderExercise(touchDragIdx, dragOverIdx);
  touchDragIdx = null; dragOverIdx = null;
}

function reorderExercise(fromIdx, toIdx) {
  const mv = arr => { const item = arr.splice(fromIdx, 1)[0]; arr.splice(toIdx, 0, item); };
  mv(workoutPlan[activeDay].exercises);
  mv(sessionData[activeDay]);
  mv(exerciseNames[activeDay]);
  mv(comments[activeDay]);
  persist(); render();
}

// ── Dashboard ─────────────────────────────────────────────────
function renderDashboard() {
  if (history.length === 0) {
    return `<div style="padding:16px"><div class="section-title" style="margin-bottom:16px">Dashboard</div>
      <div class="empty-state"><div class="empty-icon">📊</div>Save a session to see your dashboard.</div></div>`;
  }

  const now = new Date();
  const year = now.getFullYear(), month = now.getMonth();
  const firstDay = new Date(year, month, 1);
  const startOffset = firstDay.getDay();
  const daysInMonth = new Date(year, month+1, 0).getDate();
  const monthName = now.toLocaleDateString("en-US", { month: "long", year: "numeric" });

  const byDate = {};
  history.forEach(h => { const key = h.sheetTab || h.date; if (!byDate[key]) byDate[key] = []; byDate[key].push(h); });
  const sortedDates = Object.keys(byDate).sort().reverse();

  let calHtml = `<div class="cal-grid">`;
  ["S","M","T","W","T","F","S"].forEach(d => calHtml += `<div class="cal-dow">${d}</div>`);
  for (let i=0; i<startOffset; i++) calHtml += `<div class="cal-cell empty"></div>`;
  for (let day=1; day<=daysInMonth; day++) {
    const dateKey = new Date(year, month, day).toISOString().split("T")[0];
    const has = !!byDate[dateKey];
    const sel = dashSelectedDate === dateKey;
    calHtml += `<div class="cal-cell ${has?'has-session':''} ${sel?'selected':''}" ${has?`onclick="openDashDay('${dateKey}')"`:""} >${day}</div>`;
  }
  calHtml += `</div>`;

  // streak
  let streak = 0; let cursor = new Date();
  for (let i=0; i<60; i++) {
    const key = cursor.toISOString().split("T")[0];
    if (byDate[key]) { streak++; cursor.setDate(cursor.getDate()-1); } else break;
  }
  const weekStart = new Date(now); weekStart.setDate(now.getDate()-now.getDay());
  let thisWeekCount = 0;
  Object.keys(byDate).forEach(k => { const d = new Date(k+"T12:00:00"); if (d >= weekStart) thisWeekCount += byDate[k].length; });

  // last session volume
  let lastVolume = 0;
  if (history.length > 0) history[0].exercises.forEach(ex => ex.sets.forEach(s => {
    if (s.done && s.weight && s.reps) { const w=parseFloat(s.weight),r=parseFloat(s.reps); if(!isNaN(w)&&!isNaN(r)) lastVolume+=w*r; }
  }));

  // PRs
  const prMap = {};
  history.forEach(h => h.exercises.forEach(ex => ex.sets.forEach(s => {
    if (s.done && s.weight) { const w=parseFloat(s.weight); if(!isNaN(w)&&(!prMap[ex.name]||w>prMap[ex.name].weight)) prMap[ex.name]={weight:w,reps:s.reps||"—"}; }
  })));
  const prEntries = Object.entries(prMap).sort((a,b)=>b[1].weight-a[1].weight).slice(0,6);
  let prHtml = prEntries.length
    ? `<div style="overflow-x:auto;"><table style="width:100%;border-collapse:collapse;">
        <thead><tr><th style="font-size:10px;font-weight:700;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.07em;padding:0 0 8px;text-align:left;">Exercise</th><th style="font-size:10px;font-weight:700;color:var(--gold-dim);text-transform:uppercase;letter-spacing:.07em;padding:0 0 8px;text-align:right;">Best Set</th></tr></thead><tbody>` +
        prEntries.map(([name,pr]) => `<tr><td style="font-size:12px;padding:6px 0;border-bottom:1px solid #1A1A1D;color:var(--pearl);">${name}</td><td style="font-size:12px;padding:6px 0;border-bottom:1px solid #1A1A1D;color:var(--gold);font-weight:700;text-align:right;">${pr.weight}lbs × ${pr.reps}</td></tr>`).join("") +
        `</tbody></table></div>`
    : `<div style="font-size:12px;color:var(--pearl-muted);">Log weights to start tracking PRs.</div>`;

  // category breakdown last 7 days
  const sevenAgo = new Date(now); sevenAgo.setDate(now.getDate()-7);
  const catCounts = {};
  history.forEach(h => {
    const d = new Date((h.sheetTab||todayStr())+"T12:00:00");
    if (d < sevenAgo) return;
    h.exercises.forEach(ex => {
      const done = ex.sets.filter(s=>s.done||s.duration).length;
      if (done > 0) catCounts[ex.name ? (workoutPlan[activeDay]?.exercises.find(e=>e.name===ex.name)?.category||"Other") : "Other"] = (catCounts[ex.name ? (workoutPlan[activeDay]?.exercises.find(e=>e.name===ex.name)?.category||"Other") : "Other"]||0) + done;
    });
  });
  const maxCat = Math.max(1, ...Object.values(catCounts));
  let catHtml = Object.keys(catCounts).sort((a,b)=>catCounts[b]-catCounts[a]).map(cat => {
    const pct = Math.round(catCounts[cat]/maxCat*100);
    return `<div style="display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:7px;">
      <span style="width:115px;color:var(--pearl-muted);flex-shrink:0;font-size:11px;">${cat}</span>
      <div style="flex:1;background:var(--black3);border-radius:3px;height:6px;overflow:hidden;"><div style="width:${pct}%;background:var(--gold);height:100%;"></div></div>
      <span style="width:20px;text-align:right;font-weight:700;color:var(--pearl);">${catCounts[cat]}</span>
    </div>`;
  }).join("") || `<div style="font-size:12px;color:var(--pearl-muted);">No sets in last 7 days.</div>`;

  return `<div style="padding:16px">
    <div class="section-title" style="margin-bottom:16px">Dashboard</div>
    <div class="dash-card">
      <div class="dash-card-title">${monthName}</div>
      ${calHtml}
      <div style="font-size:11px;color:var(--pearl-muted);text-align:center;margin-top:8px;">Tap a highlighted day to see that session.</div>
    </div>
    <div class="dash-card">
      <div class="stat-grid">
        <div class="stat-box"><div class="stat-label">This week</div><div class="stat-value">${thisWeekCount} / ${DAYS.length}</div></div>
        <div class="stat-box"><div class="stat-label">Streak</div><div class="stat-value">${streak} day${streak===1?'':'s'}</div></div>
        <div class="stat-box"><div class="stat-label">Sessions</div><div class="stat-value">${history.length}</div></div>
        <div class="stat-box"><div class="stat-label">Last vol.</div><div class="stat-value">${lastVolume>0?Math.round(lastVolume).toLocaleString():'—'}</div></div>
      </div>
    </div>
    <div class="dash-card">
      <div class="dash-card-title">Personal Records</div>
      ${prHtml}
    </div>
    <div class="dash-card">
      <div class="dash-card-title">Sets by category — last 7 days</div>
      ${catHtml}
    </div>
  </div>`;
}

function openDashDay(dateKey) {
  dashSelectedDate = dateKey;
  const byDate = {};
  history.forEach(h => { const key = h.sheetTab || h.date; if (!byDate[key]) byDate[key] = []; byDate[key].push(h); });
  const entries = byDate[dateKey] || [];
  if (!entries.length) return;
  let bodyHtml = "";
  entries.forEach(entry => {
    const totalSetsDone = entry.exercises.reduce((a,ex) => a + ex.sets.filter(s=>s.done).length, 0);
    bodyHtml += `<div style="margin-bottom:14px;">
      <div style="font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:var(--gold);margin-bottom:2px;">${entry.date} — ${entry.day}</div>
      <div style="font-size:11px;color:var(--pearl-muted);margin-bottom:10px;">${entry.exercises.length} exercises · ${totalSetsDone} sets · ${entry.synced?'synced':'local only'}</div>`;
    entry.exercises.forEach(ex => {
      const done = ex.sets.filter(s=>s.done||s.duration);
      if (!done.length) return;
      bodyHtml += `<div style="font-size:11px;color:var(--gold-dim);font-weight:700;margin-bottom:4px;">${ex.name}</div><div style="display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px;">`;
      done.forEach(s => {
        if (s.done) bodyHtml += `<span style="font-size:11px;padding:2px 8px;border-radius:5px;background:var(--green-bg);border:1px solid var(--green-bd);color:var(--green);font-weight:700;">${s.weight?s.weight+"lbs × ":""}${s.reps||"—"}</span>`;
        else if (s.duration) bodyHtml += `<span style="font-size:11px;padding:2px 8px;border-radius:5px;background:var(--gold-bg);border:1px solid var(--gold-dim);color:var(--gold);font-weight:700;">${s.duration} mins</span>`;
      });
      bodyHtml += `</div>`;
    });
    bodyHtml += `</div>`;
  });
  document.getElementById("modal-container").innerHTML = `
    <div class="modal-overlay" onclick="if(event.target===this){document.getElementById('modal-container').innerHTML='';dashSelectedDate=null;}">
      <div class="modal-box" onclick="event.stopPropagation()">
        <div class="modal-handle"></div>
        ${bodyHtml}
        <button class="modal-btn-cancel" onclick="document.getElementById('modal-container').innerHTML='';dashSelectedDate=null;" style="width:100%;padding:11px;border-radius:9px;border:1px solid #2A2000;background:transparent;color:var(--pearl-muted);font-size:13px;font-weight:700;cursor:pointer;font-family:Barlow,sans-serif;margin-top:4px;">Close</button>
      </div>
    </div>`;
}


// ── History ───────────────────────────────────────────────────
function renderHistory() {
  let html = `<div style="padding:16px"><div class="section-title" style="margin-bottom:16px">Session History</div>`;
  if (history.length === 0) {
    html += `<div class="empty-state"><div class="empty-icon">📋</div>No sessions saved yet.</div>`;
  } else {
    history.forEach(entry => {
      const totalSetsDone = entry.exercises.reduce((a,ex) => a + ex.sets.filter(s=>s.done).length, 0);
      html += `<div class="hist-wrap">
        <div class="hist-head">
          <div><div class="hist-day">${entry.day}</div><div class="hist-date">${entry.date}</div></div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
            <span class="hist-badge ${entry.synced?'synced':'local'}">${entry.synced?'Synced':'Local'}</span>
            <span style="font-size:11px;color:var(--pearl-muted);">${totalSetsDone} sets</span>
          </div>
        </div>
        <div style="overflow-x:auto;">
        <table class="hist-tbl">
          <thead><tr><th>Exercise</th><th>Set 1</th><th>Set 2</th><th>Set 3</th><th>Notes</th></tr></thead>
          <tbody>`;
      entry.exercises.forEach(ex => {
        const hasDone = ex.sets.some(s=>s.done||s.duration);
        if (!hasDone) return;
        const fmt = s => s && s.done ? `${s.weight||'—'}×${s.reps||'—'}` : s && s.duration ? `${s.duration}m` : '—';
        html += `<tr>
          <td class="ex-name">${ex.name}</td>
          <td class="set-val">${fmt(ex.sets[0])}</td>
          <td class="set-val">${fmt(ex.sets[1])}</td>
          <td class="set-val">${fmt(ex.sets[2])}</td>
          <td class="note-val">${ex.comment||'—'}</td>
        </tr>`;
      });
      html += `</tbody></table></div></div>`;
    });
  }
  html += `</div>`; return html;
}

// ── Export ────────────────────────────────────────────────────
function renderExport() {
  const syncedCount = history.filter(h => h.synced).length;
  return `<div style="padding:16px">
    <div class="section-title" style="margin-bottom:6px;">Save & Export</div>
    <div style="font-size:12px;color:var(--pearl-muted);margin-bottom:20px;">Auto-saves locally · syncs to Google Sheets on session save.</div>
    <div class="export-card">
      <div class="export-card-title">Auto-Save Status</div>
      <div class="status-ok">Local storage active</div>
      <div class="status-sub">Sessions saved: ${history.length}</div>
      <div class="sheets-badge">Google Sheets · ${syncedCount} synced</div>
    </div>
    <div class="export-card">
      <div class="export-card-title">Reload Sheets History</div>
      <div class="export-card-desc">Refresh suggested weights from your Sheets data.</div>
      <button class="export-btn-p" onclick="fetchSheetsHistory()" style="width:100%">Reload from Sheets</button>
    </div>
    <div class="export-card">
      <div class="export-card-title">Export History</div>
      <div class="export-card-desc">Download your full workout log as a backup file.</div>
      <div class="export-btns">
        <button class="export-btn-p" onclick="exportCSV()">Export CSV</button>
        <button class="export-btn-s" onclick="exportJSON()">Export JSON</button>
      </div>
    </div>
    <div class="export-card">
      <div class="export-card-title">Add to Home Screen</div>
      <div class="export-card-desc" style="margin-bottom:0;">
        <strong style="color:var(--gold);">iPhone:</strong> Safari → Share → Add to Home Screen<br>
        <strong style="color:var(--gold);">Android:</strong> Chrome → Menu → Add to Home Screen
      </div>
    </div>
    <div class="danger-card">
      <div class="danger-title">Clear All History</div>
      <div style="font-size:12px;color:var(--pearl-muted);">Clears local history only. Sheets data is unaffected.</div>
      <button class="danger-btn" onclick="clearHistory()">Clear Local History</button>
    </div>
  </div>`;
}

async function saveSession() {
  const plan = workoutPlan[activeDay];
  const data = sessionData[activeDay];
  const names = exerciseNames[activeDay];
  const exComments = comments[activeDay];
  const chosenDate = sessionDates[activeDay] || todayStr();
  const dateObj = new Date(chosenDate + "T12:00:00");
  const timestamp = dateObj.toLocaleDateString("en-US", { month:"short", day:"numeric", year:"numeric" });
  const entry = {
    day: activeDay, date: timestamp, sheetTab: chosenDate, synced: false,
    exercises: plan.exercises.map((ex, i) => ({
      name: names[i], sets: JSON.parse(JSON.stringify(data[i].logged)), comment: exComments[i]||""
    }))
  };
  history.unshift(entry);
  sessionData[activeDay] = initSetsForDay(activeDay);
  comments[activeDay] = initCommentsForDay(activeDay);
  sessionDates[activeDay] = todayStr();
  persist(); syncState = "syncing"; render();
  try {
    const response = await fetch(APPS_SCRIPT_URL, { method: "POST", body: JSON.stringify(entry) });
    const result = await response.json();
    if (result.success) { history[0].synced = true; persist(); syncState = "success"; showToast(`${activeDay} saved and synced`); }
    else { syncState = "error"; syncMessage = "Sheets sync failed"; showToast(`${activeDay} saved locally`); }
  } catch(err) { syncState = "error"; syncMessage = "No internet"; showToast(`${activeDay} saved locally`); }
  render();
}

function exportCSV() {
  const rows = [["Date","Day","Exercise","Set","Weight (lbs)","Reps","Notes","Synced"]];
  history.forEach(entry => {
    entry.exercises.forEach(ex => {
      ex.sets.forEach((s, idx) => {
        if (s.done) rows.push([entry.date, entry.day, ex.name, idx+1, s.weight||"", s.reps||"", ex.comment||"", entry.synced?"Yes":"No"]);
      });
    });
  });
  downloadFile(rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n"), "workout-history.csv", "text/csv");
  showToast("Exported as CSV");
}
function exportJSON() {
  downloadFile(JSON.stringify({ exportedAt: new Date().toISOString(), history }, null, 2), "workout-history.json", "application/json");
  showToast("Exported as JSON");
}
function downloadFile(content, filename, type) {
  const blob = new Blob([content], { type });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a"); a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}
function clearHistory() {
  if (!confirm("Clear local history? Sheets data is unaffected.")) return;
  history = []; persist(); showToast("History cleared"); render();
}

fetchSheetsHistory();
fetchSheetsSessions();
render();
</script>
</body>
</html>
